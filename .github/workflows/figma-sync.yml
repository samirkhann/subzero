name: Figma to GitHub Sync
on:
  workflow_dispatch:
    inputs:
      fileKey:
        description: 'Figma File Key'
        required: true
      page:
        description: 'Figma Page'
        required: false
      selection:
        description: 'Figma Selection'
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Process Figma Design
        run: |
          echo "Syncing from File: ${{ github.event.inputs.fileKey }}"
          echo "Last Sync: $(date)" > last_sync.txt
          git config --global user.name "SubZero-Bot"
          git config --global user.email "bot@subzero.io"
          git add .
          git commit -m "Design update from Figma" || echo "No changes"
          git push
