name: Figma to GitHub Sync
on:
  workflow_dispatch:
  repository_dispatch:
    types: [figma-update]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Update Subzero Site
        run: |
          echo "Updating files from Figma..."
          # This assumes your plugin sends an index.html file
          # If the plugin doesn't send the file directly, 
          # you'll manually add the code it generated here.
          git config --global user.name "SubZero-Bot"
          git config --global user.email "bot@subzero.io"
          git add .
          git commit -m "Design update from Figma" || echo "No changes to commit"
          git push
