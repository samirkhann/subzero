name: Figma to GitHub Sync
on:
  workflow_dispatch:
    inputs:
      fileKey:
        description: 'The Figma File Key'
        required: true
      page:
        description: 'The Figma Page Name'
        required: false
      selection:
        description: 'The Figma Selection'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Sync Design Data
        run: |
          echo "Processing Figma File Key: ${{ github.event.inputs.fileKey }}"
          echo "Processing Selection: ${{ github.event.inputs.selection }}"
          
          # This creates a log or updates a file so GitHub has something to commit
          echo "Last Sync: $(date)" > last_sync.txt
          
          git config --global user.name "SubZero-Bot"
          git config --global user.email "bot@subzero.io"
          git add .
          git commit -m "Design update from Figma - ${{ github.event.inputs.fileKey }}" || echo "No changes"
          git push
